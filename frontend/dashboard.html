<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - SaludPro</title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        /* CONTENEDOR */
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;

            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        /* HEADER */
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #007BFF;
            text-align: center;
        }

        .logo span {
            color: #28a745;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        h3 {
            margin-top: 20px;
            margin-bottom: 10px;
        }

        /* INPUTS */
        select, input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        /* BOTONES */
        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-green {
            background: #28a745;
        }

        .btn-red {
            background: red;
            margin-top: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        /* LISTA */
        ul {
            list-style: none;
        }

        li {
            background: #f1f1f1;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
        }

        footer {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo">Salud<span>Pro</span></div>
    <div class="subtitle">Gestión de citas médicas</div>

    <h2>📅 Agendar Cita</h2>

    <select id="specialty" onchange="loadDoctors()"></select>
    <select id="doctor"></select>
    <input id="date" type="datetime-local">

    <button class="btn-green" onclick="create()">Crear cita</button>

    <h3>Mis citas</h3>
    <ul id="list"></ul>

    <footer>
        © 2025 SaludPro
    </footer>

</div>

<script>

// 🔒 Verificar sesión
if(!localStorage.getItem("user")){
    alert("Debes iniciar sesión");
    window.location.href = "login.html";
}

// =========================
// CARGAR ESPECIALIDADES
// =========================
async function loadSpecialties(){
    try {
        const res = await fetch("http://localhost:5000/api/specialties");
        const data = await res.json();

        const sel = document.getElementById("specialty");
        sel.innerHTML = "";

        data.forEach(s => {
            sel.innerHTML += `<option>${s}</option>`;
        });

        loadDoctors();

    } catch {
        alert("Error cargando especialidades");
    }
}

// =========================
// CARGAR DOCTORES
// =========================
async function loadDoctors(){
    const specialty = document.getElementById("specialty").value;

    try {
        const res = await fetch(`http://localhost:5000/api/doctors/${specialty}`);
        const data = await res.json();

        const sel = document.getElementById("doctor");
        sel.innerHTML = "";

        data.forEach(d => {
            sel.innerHTML += `<option>${d}</option>`;
        });

    } catch {
        alert("Error cargando doctores");
    }
}

// =========================
// CREAR CITA
// =========================
async function create(){

    const doctor = document.getElementById("doctor").value;
    const specialty = document.getElementById("specialty").value;
    const date = document.getElementById("date").value;

    if(!doctor || !specialty || !date){
        alert("Completa todos los campos");
        return;
    }

    try {
        const res = await fetch("http://localhost:5000/api/appointments", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                user: localStorage.getItem("user"),
                doctor,
                specialty,
                date
            })
        });

        const data = await res.json();

        if(res.ok){
            alert("Cita creada ✅");
            load();
        } else {
            alert(data.error);
        }

    } catch {
        alert("Error al crear cita");
    }
}

// =========================
// ELIMINAR CITA
// =========================
async function deleteCita(id){
    await fetch(`http://localhost:5000/api/appointments/${id}`, {
        method: "DELETE"
    });

    load();
}

// =========================
// CARGAR CITAS
// =========================
async function load(){
    try {
        const res = await fetch("http://localhost:5000/api/appointments");
        const data = await res.json();

        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(c => {
            list.innerHTML += `
            <li>
                📅 ${c.date} <br>
                🩺 ${c.doctor} (${c.specialty}) <br>
                <button class="btn-red" onclick="deleteCita(${c.id})">Eliminar</button>
            </li>`;
        });

    } catch {
        alert("Error cargando citas");
    }
}

// INIT
loadSpecialties();
load();

</script>

</body>
</html>
