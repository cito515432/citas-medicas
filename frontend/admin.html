<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container">
    <div class="icon">👑</div>
    <h2>Panel Administrador</h2>

    <ul id="list"></ul>
</div>

<script>

// 🔒 PROTECCIÓN
if(localStorage.getItem("role") !== "admin"){
    alert("Acceso denegado");
    window.location.href = "login.html";
}

const list = document.getElementById("list");

// =========================
// CARGAR CITAS
// =========================
async function load(){
    try {
        const res = await fetch("http://localhost:5000/api/admin/appointments");
        const data = await res.json();

        list.innerHTML = "";

        data.forEach(c => {
            list.innerHTML += `
            <li>
                👤 ${c.user} <br>
                🩺 ${c.doctor} (${c.specialty}) <br>
                📅 ${c.date} <br>
                📌 Estado: ${c.status} <br>

                <button class="btn-red" onclick="deleteCita(${c.id})">Eliminar</button>
                <button class="btn-orange" onclick="editCita(${c.id})">Editar</button>
            </li>`;
        });

    } catch {
        alert("Error cargando citas");
    }
}

// =========================
// ELIMINAR
// =========================
async function deleteCita(id){
    await fetch(`http://localhost:5000/api/appointments/${id}`, {
        method: "DELETE"
    });

    load();
}

// =========================
// EDITAR
// =========================
async function editCita(id){

    const doctor = prompt("Nuevo doctor:");
    const specialty = prompt("Nueva especialidad:");
    const date = prompt("Nueva fecha (YYYY-MM-DD HH:MM):");

    if(!doctor || !specialty || !date){
        alert("Datos inválidos");
        return;
    }

    await fetch(`http://localhost:5000/api/appointments/${id}`, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            doctor,
            specialty,
            date
        })
    });

    load();
}

// INIT
load();

</script>

</body>
</html>
