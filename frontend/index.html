<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clínica - Sistema de Citas</title>
<link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 350px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #555;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
        }

        .register {
            background: #28a745;
            color: white;
        }

        .login {
            background: #007BFF;
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="icon">🏥</div>
    <h1>Clínica Digital</h1>
    <p>Gestiona tus citas médicas de forma rápida y sencilla</p>

    <a href="register.html" class="btn register">📝 Registrarse</a>
    <a href="login.html" class="btn login">🔐 Iniciar sesión</a>
</div>

</body>
</html>
