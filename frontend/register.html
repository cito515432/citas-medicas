<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - SaludPro</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#4facfe,#00f2fe);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:18px}
        .container{background:white;padding:40px 30px;border-radius:20px;width:90%;max-width:400px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.2)}.logo{font-size:40px;font-weight:bold;color:#007BFF}.logo span{color:#28a745}.subtitle{color:#666;margin:10px 0 20px}h2{margin-bottom:15px}input{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #ccc;outline:none;font-size:14px}input:focus{border:1px solid #28a745;box-shadow:0 0 5px rgba(40,167,69,.4)}button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;background:#28a745;color:white;font-size:16px;font-weight:bold;cursor:pointer;transition:.3s}button:hover{transform:translateY(-2px);opacity:.9}.link{display:block;margin-top:15px;text-decoration:none;color:#007BFF;font-size:14px}.link:hover{text-decoration:underline}footer{margin-top:15px;font-size:12px;color:#aaa}
    </style>
</head>
<body>
<div class="container">
    <div class="logo">Salud<span>Pro</span></div>
    <div class="subtitle">Crea tu cuenta</div>
    <h2>Registro</h2>
    <input id="email" placeholder="Correo electrónico">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="register()">Registrarse</button>
    <a href="login.html" class="link">¿Ya tienes cuenta? Inicia sesión</a>
    <footer>© 2026 SaludPro</footer>
</div>

<script>
const API_BASE = "https://citas-medicas-htmz.onrender.com/api";

async function register(){
    const email = document.getElementById("email").value.trim().toLowerCase();
    const password = document.getElementById("password").value;

    if(!email || !password){
        alert("Completa todos los campos");
        return;
    }

    try{
        const res = await fetch(`${API_BASE}/register`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if(res.ok){
            alert("Registro exitoso ✅");
            window.location.href = "login.html";
        } else {
            alert(data.error || "Error al registrar usuario");
        }
    } catch(error){
        alert("No se pudo conectar con el servidor");
    }
}
</script>
</body>
</html>
