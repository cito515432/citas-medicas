spring.application.name=backend

# Render usa PORT; local/Docker Compose puede usar SERVER_PORT o 8081.
server.address=0.0.0.0
server.port=${PORT:${SERVER_PORT:8081}}

# Base de datos. En Render se puede construir por MYSQL_HOSTPORT o pasar SPRING_DATASOURCE_URL directo.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/globalisosecurity?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

jwt.secret=${JWT_SECRET:GlobalIsoSecurity2026ClaveSecretaCambiarEnProduccion}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Orígenes permitidos si el frontend llama directo al backend.
# Si se usa Nginx proxy /api, normalmente no se activa CORS.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5500,http://127.0.0.1:5500}
