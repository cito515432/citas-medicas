services:
  - type: web
    name: globaliso-backend-cito515432
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 86400000
      - key: CORS_ALLOWED_ORIGINS
        value: https://globaliso-frontend-cito515432.onrender.com,http://localhost:8080,http://localhost:5500,http://127.0.0.1:5500

  - type: web
    name: globaliso-frontend-cito515432
    runtime: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile.render
    dockerContext: ./frontend
    healthCheckPath: /pages/login.html
    envVars:
      - key: PORT
        value: 10000
      - key: BACKEND_URL
        value: https://globaliso-backend-cito515432.onrender.com
