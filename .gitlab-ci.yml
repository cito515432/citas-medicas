stages:
  - test
  - security

include:
  - template: Jobs/SAST.gitlab-ci.yml

variables:
  SEARCH_MAX_DEPTH: "6"

python-syntax-check:
  image: python:3.11
  stage: test
  script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - python -m py_compile app.py database.py routes/*.py utils/*.py
  artifacts:
    when: always
    expire_in: 1 week

bandit-sast-local:
  image: python:3.11
  stage: security
  script:
    - python -m pip install --upgrade pip
    - pip install bandit
    - bandit -r . -f json -o bandit-report.json || true
  artifacts:
    when: always
    paths:
      - bandit-report.json
    expire_in: 1 week